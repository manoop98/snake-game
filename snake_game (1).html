<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game — Karma</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --screen-green: #9dd86a;
    --screen-dark: #4a7c2e;
    --screen-mid: #3d6827;
    --screen-deep: #2a5010;
    --phone-body: #2c2c2c;
    --phone-dark: #1a1a1a;
    --phone-mid: #3a3a3a;
    --accent: #5faa20;
    --lb-bg: #111;
    --lb-border: #2a2a2a;
    --lb-row: #1a1a1a;
    --text-main: #e8e8e8;
    --text-muted: #777;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
  }

  body {
    background: #0d0d0d;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    padding: 20px;
    gap: 0;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .page-title {
    font-family: 'Press Start 2P', monospace;
    color: var(--screen-green);
    font-size: 10px;
    letter-spacing: 3px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px rgba(157,216,106,0.5);
    opacity: 0.7;
  }

  .game-wrapper {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── PHONE ── */
  .phone {
    background: linear-gradient(160deg, #383838 0%, #242424 60%, #1a1a1a 100%);
    border-radius: 30px 30px 36px 36px;
    padding: 18px 16px 30px;
    border: 2px solid #444;
    border-bottom-color: #111;
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.08),
      inset 0 -2px 4px rgba(0,0,0,0.5),
      0 20px 60px rgba(0,0,0,0.8),
      0 0 0 1px #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 240px;
    flex-shrink: 0;
  }

  .phone-logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #666;
    letter-spacing: 4px;
  }

  .speaker-dots {
    display: flex;
    gap: 4px;
    margin-top: -4px;
  }
  .speaker-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #1a1a1a;
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.8);
  }

  .screen-bezel {
    background: #111;
    border-radius: 6px;
    padding: 5px;
    border: 2px solid #0a0a0a;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.9), 0 0 0 1px #333;
    position: relative;
  }

  .screen {
    position: relative;
    width: 208px;
    overflow: hidden;
    border-radius: 3px;
  }

  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 7px;
    background: var(--screen-mid);
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--screen-green);
    border-bottom: 1px solid var(--screen-deep);
  }

  canvas {
    display: block;
    background: var(--screen-dark);
  }

  /* Overlay */
  .overlay {
    position: absolute;
    top: 22px; left: 0; right: 0; bottom: 0;
    background: rgba(42, 80, 16, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 10;
  }
  .overlay-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--screen-green);
    text-shadow: 0 0 8px rgba(157,216,106,0.6);
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0.3; } }
  .overlay-score {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #c0e855;
  }
  .overlay-sub {
    font-size: 9px;
    color: #7bc24a;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.8;
  }
  .overlay-btn {
    background: var(--screen-deep);
    border: 2px solid var(--screen-green);
    color: var(--screen-green);
    padding: 6px 14px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 4px;
    transition: all 0.1s;
  }
  .overlay-btn:hover {
    background: var(--screen-mid);
    box-shadow: 0 0 8px rgba(157,216,106,0.4);
  }

  /* D-Pad */
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .d-pad {
    display: grid;
    grid-template-columns: repeat(3, 42px);
    grid-template-rows: repeat(3, 42px);
    gap: 3px;
  }
  .d-btn {
    background: linear-gradient(145deg, #444, #2a2a2a);
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    color: #bbb;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    box-shadow: 0 3px 0 #111, inset 0 1px 0 rgba(255,255,255,0.06);
    transition: all 0.08s;
  }
  .d-btn:active, .d-btn.pressed {
    background: linear-gradient(145deg, #555, #3a3a3a);
    transform: translateY(2px);
    box-shadow: 0 1px 0 #111;
    color: var(--screen-green);
  }
  .d-center {
    border-radius: 50% !important;
    background: linear-gradient(145deg, #4a4a4a, #2a2a2a) !important;
    font-size: 9px !important;
    color: #777 !important;
    font-family: 'Press Start 2P', monospace;
  }
  .d-empty { background: transparent !important; border: none !important; box-shadow: none !important; cursor: default !important; }

  /* ── SIDE PANEL ── */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 220px;
    flex-shrink: 0;
  }

  /* Leaderboard */
  .lb-card {
    background: #141414;
    border: 1px solid var(--lb-border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .lb-header {
    background: linear-gradient(90deg, #1a3d08, #2a5010);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #2a5010;
  }
  .lb-header-icon {
    font-size: 14px;
  }
  .lb-header-text {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--screen-green);
    letter-spacing: 2px;
  }
  .lb-body { padding: 4px 0; }
  .lb-row {
    display: flex;
    align-items: center;
    padding: 7px 14px;
    gap: 8px;
    border-bottom: 1px solid #1e1e1e;
    transition: background 0.15s;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: #1e1e1e; }
  .lb-rank {
    font-size: 13px;
    width: 22px;
    text-align: center;
    flex-shrink: 0;
  }
  .lb-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .lb-time { font-size: 10px; color: #666; }
  .lb-score {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--screen-green);
  }
  .lb-empty {
    color: #444;
    font-size: 10px;
    text-align: center;
    padding: 20px 14px;
    line-height: 1.8;
  }
  .lb-new {
    font-size: 8px;
    color: #c0e855;
    background: #1a3d08;
    border: 1px solid #3d6827;
    padding: 1px 5px;
    border-radius: 3px;
    animation: newBlink 1s step-end 4;
  }
  @keyframes newBlink { 50% { opacity: 0; } }

  /* High score strip */
  .hi-strip {
    background: #141414;
    border: 1px solid var(--lb-border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .hi-label { font-size: 10px; color: #555; }
  .hi-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--gold);
    text-shadow: 0 0 6px rgba(255,215,0,0.3);
  }

  /* Branding */
  .branding {
    background: #141414;
    border: 1px solid var(--lb-border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 6px;
  }
  .brand-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px rgba(95,170,32,0.5);
    flex-shrink: 0;
  }
  .brand-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text-main);
    letter-spacing: 0.5px;
    line-height: 1.6;
    text-align: left;
  }
  .brand-sub {
    font-size: 9px;
    color: #555;
    margin-top: 2px;
  }
  .brand-divider {
    width: 30px;
    height: 1px;
    background: #2a2a2a;
    margin: 8px auto;
  }
  .brand-tagline {
    font-size: 9px;
    color: #3a3a3a;
    letter-spacing: 2px;
  }

  /* Instructions */
  .instructions {
    font-size: 9px;
    color: #333;
    text-align: center;
    line-height: 1.9;
    letter-spacing: 0.5px;
  }

  /* Mobile adjustments */
  @media (max-width: 540px) {
    .game-wrapper { gap: 14px; }
    .side-panel { width: 100%; max-width: 380px; flex-direction: row; flex-wrap: wrap; }
    .lb-card { flex: 1; min-width: 180px; }
    .branding { flex: 1; min-width: 140px; }
    .hi-strip { display: none; }
    .instructions { display: none; }
  }
</style>
</head>
<body>

<div class="page-title">NOKIA SNAKE</div>

<div class="game-wrapper">

  <!-- PHONE -->
  <div class="phone">
    <div class="phone-logo">KARMA</div>
    <div class="speaker-dots">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="screen-bezel">
      <div class="screen" id="screenContainer">
        <div class="score-bar">
          <span>SCORE:<span id="scoreDisp">0</span></span>
          <span>SNAKE</span>
        </div>
        <canvas id="gameCanvas" width="208" height="208"></canvas>
        <div class="overlay" id="overlay">
          <div class="overlay-title" id="overlayTitle">SNAKE</div>
          <div class="overlay-score" id="overlayScore" style="display:none"></div>
          <div class="overlay-sub" id="overlaySub">USE ARROW KEYS<br>OR D-PAD BELOW</div>
          <button class="overlay-btn" id="startBtn">▶ START</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="d-pad">
        <div class="d-btn d-empty"></div>
        <div class="d-btn" id="btnUp">▲</div>
        <div class="d-btn d-empty"></div>
        <div class="d-btn" id="btnLeft">◄</div>
        <div class="d-btn d-center" id="btnOk">OK</div>
        <div class="d-btn" id="btnRight">►</div>
        <div class="d-btn d-empty"></div>
        <div class="d-btn" id="btnDown">▼</div>
        <div class="d-btn d-empty"></div>
      </div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel">

    <div class="hi-strip">
      <span class="hi-label">HIGH SCORE</span>
      <span class="hi-val" id="hiScoreDisp">000</span>
    </div>

    <div class="lb-card">
      <div class="lb-header">
        <span class="lb-header-icon">🏆</span>
        <span class="lb-header-text">LEADERBOARD</span>
      </div>
      <div class="lb-body" id="lbBody">
        <div class="lb-empty">NO SCORES YET.<br>PLAY TO SET A RECORD!</div>
      </div>
    </div>



    <div class="instructions">
      ARROW KEYS TO MOVE<br>
      EAT ■ TO GROW<br>
      DON'T HIT THE WALL<br>
      ENTER TO RESTART
    </div>

  </div>
</div>

<script>
  const COLS = 16, ROWS = 16, CELL = 13;
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayScore = document.getElementById('overlayScore');
  const overlaySub = document.getElementById('overlaySub');
  const startBtn = document.getElementById('startBtn');
  const scoreDisp = document.getElementById('scoreDisp');
  const hiScoreDisp = document.getElementById('hiScoreDisp');
  const lbBody = document.getElementById('lbBody');

  // Colors
  const C = {
    bg:     '#4a7c2e',
    grid:   '#427228',
    body:   '#1a3d08',
    head:   '#0d2204',
    eye:    '#5faa20',
    food:   '#c0e855',
    foodGlow: '#e8f08a',
  };

  let snake, dir, nextDir, food, score, gameLoop, running, isGameOver;
  let leaderboard = [];
  let highScore = 0;
  let lastScore = null;
  let tick = 0;

  // ── INIT ──
  function initGame() {
    snake = [{x:8,y:8},{x:7,y:8},{x:6,y:8}];
    dir      = {x:1, y:0};
    nextDir  = {x:1, y:0};
    score    = 0;
    isGameOver = false;
    running  = true;
    tick     = 0;
    scoreDisp.textContent = '0';
    spawnFood();
    clearInterval(gameLoop);
    gameLoop = setInterval(step, 145);
    overlay.style.display = 'none';
    draw();
  }

  function spawnFood() {
    let pos;
    do {
      pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    } while (snake.some(s => s.x===pos.x && s.y===pos.y));
    food = pos;
  }

  // ── GAME STEP ──
  function step() {
    if (!running) return;
    tick++;
    dir = {...nextDir};
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    if (head.x<0 || head.x>=COLS || head.y<0 || head.y>=ROWS ||
        snake.some(s => s.x===head.x && s.y===head.y)) {
      endGame(); return;
    }

    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) {
      score += 10;
      scoreDisp.textContent = score;
      spawnFood();
      // Speed up slightly every 50pts
      if (score % 50 === 0) {
        clearInterval(gameLoop);
        const spd = Math.max(70, 145 - Math.floor(score/50)*10);
        gameLoop = setInterval(step, spd);
      }
    } else {
      snake.pop();
    }
    draw();
  }

  // ── DRAW ──
  function draw() {
    // BG
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, COLS*CELL, ROWS*CELL);

    // Grid
    ctx.strokeStyle = C.grid;
    ctx.lineWidth = 0.4;
    for (let i=0; i<=COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, ROWS*CELL); ctx.stroke();
    }
    for (let j=0; j<=ROWS; j++) {
      ctx.beginPath(); ctx.moveTo(0, j*CELL); ctx.lineTo(COLS*CELL, j*CELL); ctx.stroke();
    }

    // Food (pulsing)
    const pulse = 0.5 + 0.5*Math.sin(tick * 0.25);
    ctx.fillStyle = C.foodGlow;
    ctx.fillRect(food.x*CELL+1, food.y*CELL+1, CELL-2, CELL-2);
    ctx.fillStyle = C.food;
    ctx.fillRect(food.x*CELL+2+pulse, food.y*CELL+2+pulse, CELL-4-pulse*2, CELL-4-pulse*2);

    // Snake body
    for (let i = snake.length-1; i >= 0; i--) {
      const s = snake[i];
      if (i === 0) {
        // Head
        ctx.fillStyle = C.head;
        ctx.fillRect(s.x*CELL, s.y*CELL, CELL, CELL);
        // Highlight
        ctx.fillStyle = 'rgba(95,170,32,0.25)';
        ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, 4);
        // Eyes
        ctx.fillStyle = C.eye;
        const ex1 = dir.x===1  ? CELL-4 : dir.x===-1 ? 2 : dir.y===0  ? 2      : CELL/2-2;
        const ey1 = dir.y===1  ? CELL-4 : dir.y===-1 ? 2 : dir.x===0  ? 2      : CELL/2-2;
        const ex2 = dir.x===0  ? CELL-4 : ex1;
        const ey2 = dir.y===0  ? CELL-4 : ey1;
        ctx.fillRect(s.x*CELL+ex1, s.y*CELL+ey1, 2, 2);
        ctx.fillRect(s.x*CELL+ex2, s.y*CELL+ey2, 2, 2);
      } else {
        // Body — slightly lighter toward tail
        const alpha = 0.6 + 0.4*(1 - i/snake.length);
        ctx.fillStyle = C.body;
        ctx.globalAlpha = alpha;
        ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
        ctx.globalAlpha = 1;
        // Scale pattern
        if (i % 2 === 0) {
          ctx.fillStyle = 'rgba(95,170,32,0.08)';
          ctx.fillRect(s.x*CELL+2, s.y*CELL+2, CELL-4, CELL-4);
        }
      }
    }
  }

  // ── END ──
  function endGame() {
    running = false;
    isGameOver = true;
    clearInterval(gameLoop);

    if (score > highScore) highScore = score;
    hiScoreDisp.textContent = String(highScore).padStart(3,'0');

    const isNew = addToLeaderboard(score);
    lastScore = score;

    overlayTitle.textContent = 'GAME OVER';
    overlayScore.style.display = 'block';
    overlayScore.textContent = 'SCORE: ' + score;
    overlaySub.textContent = isNew ? 'NEW HIGH SCORE!\nPRESS TO PLAY' : 'PRESS TO PLAY AGAIN';
    overlaySub.style.whiteSpace = 'pre';
    startBtn.textContent = '▶ RESTART';
    overlay.style.display = 'flex';
  }

  // ── LEADERBOARD ──
  function addToLeaderboard(s) {
    if (s === 0) return false;
    const prev = leaderboard.map(e => e.score);
    const now = new Date();
    const time = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    leaderboard.push({score: s, time, isNew: true});
    leaderboard.sort((a,b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 8);
    setTimeout(() => {
      leaderboard.forEach(e => e.isNew = false);
      renderLeaderboard();
    }, 4000);
    const isNewHigh = s > (prev[0] || 0);
    renderLeaderboard();
    return isNewHigh;
  }

  const MEDALS = ['🥇','🥈','🥉'];
  function renderLeaderboard() {
    if (!leaderboard.length) {
      lbBody.innerHTML = '<div class="lb-empty">NO SCORES YET.<br>PLAY TO SET A RECORD!</div>';
      return;
    }
    lbBody.innerHTML = leaderboard.map((e,i) => `
      <div class="lb-row">
        <span class="lb-rank">${i < 3 ? MEDALS[i] : '#'+(i+1)}</span>
        <div class="lb-info">
          <span class="lb-score">${String(e.score).padStart(4,'0')}</span>
          <span class="lb-time">${e.time}</span>
        </div>
        ${e.isNew ? '<span class="lb-new">NEW</span>' : ''}
      </div>
    `).join('');
  }

  // ── CONTROLS ──
  function setDir(dx, dy) {
    if (dx===1  && dir.x===-1) return;
    if (dx===-1 && dir.x===1)  return;
    if (dy===1  && dir.y===-1) return;
    if (dy===-1 && dir.y===1)  return;
    nextDir = {x:dx, y:dy};
  }

  document.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' '].includes(e.key)) e.preventDefault();
    if (!running) {
      if (e.key==='Enter' || e.key===' ') { initGame(); return; }
    }
    if (e.key==='ArrowUp')    setDir(0,-1);
    if (e.key==='ArrowDown')  setDir(0,1);
    if (e.key==='ArrowLeft')  setDir(-1,0);
    if (e.key==='ArrowRight') setDir(1,0);
  });

  function dpad(dx, dy) {
    if (!running) { initGame(); return; }
    setDir(dx, dy);
  }

  document.getElementById('btnUp').addEventListener('click',    () => dpad(0,-1));
  document.getElementById('btnDown').addEventListener('click',  () => dpad(0,1));
  document.getElementById('btnLeft').addEventListener('click',  () => dpad(-1,0));
  document.getElementById('btnRight').addEventListener('click', () => dpad(1,0));
  document.getElementById('btnOk').addEventListener('click',    () => { if (!running) initGame(); });
  startBtn.addEventListener('click', initGame);

  // Touch swipe support
  let touchX=0, touchY=0;
  canvas.addEventListener('touchstart', e => {
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    const dy = e.changedTouches[0].clientY - touchY;
    if (!running) { initGame(); return; }
    if (Math.abs(dx) > Math.abs(dy)) { setDir(dx>0?1:-1, 0); }
    else { setDir(0, dy>0?1:-1); }
    e.preventDefault();
  }, {passive:false});

  // Initial draw
  draw();
</script>
</body>
</html>
